:root{
  --bg:#10201a;          /* deep forest night */
  --bg2:#16302708;
  --panel:#1a2f28;       /* dark fir panel */
  --panel2:#223a31;
  --line:#34514650;
  --ink:#eae6d8;         /* cream text */
  --dim:#8fa39a;
  --green:#0c5c3f;       /* title-card green */
  --greenLt:#3f9b6e;
  --cream:#f0ead6;       /* title-card cream */
  --crimson:#8a1119;     /* red room */
  --crimsonLt:#c4202b;
  --gold:#c9a24a;        /* owl / coffee gold */
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:"Inter","Helvetica Neue",sans-serif;
  color:var(--ink);padding-bottom:70px;font-weight:500;
  -webkit-font-smoothing:antialiased;
  background-color:var(--bg);
  background-image:
    linear-gradient(180deg, rgba(8,18,14,0) 0%, rgba(8,18,14,0.55) 70%, rgba(6,14,11,0.85) 100%),
    radial-gradient(ellipse 120% 60% at 50% -10%, rgba(63,155,110,0.10), transparent 60%),
    repeating-linear-gradient(135deg, rgba(255,255,255,0.012) 0 8px, transparent 8px 16px);
  background-attachment:fixed;
}
.wrap{max-width:640px;margin:0 auto;padding:16px 16px 0;position:relative;z-index:1;}

/* ===== TWIN PEAKS TITLE CARD ===== */
header{position:relative;margin-bottom:20px;}
.masthead{
  background:var(--green);
  border:1px solid #0a3f2c;border-radius:2px;
  padding:30px 22px 26px;position:relative;overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,0.55), inset 0 0 80px rgba(0,0,0,0.35);
}
.masthead::after{
  /* fog */
  content:"";position:absolute;left:0;right:0;bottom:0;height:60%;
  background:linear-gradient(180deg, transparent, rgba(240,234,214,0.10));
  pointer-events:none;
}
.welcome{
  font-family:"Oswald",sans-serif;font-weight:400;font-size:12px;letter-spacing:6px;
  color:var(--cream);opacity:0.85;text-transform:uppercase;text-align:center;margin-bottom:6px;
}
h1{
  font-family:"TPGothic","Oswald",sans-serif;font-weight:400;
  font-size:54px;line-height:0.92;margin:0;color:var(--cream);
  letter-spacing:2px;text-transform:uppercase;text-align:center;
  text-shadow:0 2px 10px rgba(0,0,0,0.5);
}
.locating{
  font-family:"Oswald",sans-serif;font-weight:300;font-size:12px;letter-spacing:4px;
  color:var(--cream);opacity:0.7;text-transform:uppercase;text-align:center;margin-top:10px;
}
.owl{display:block;margin:0 auto 10px;width:64px;height:64px;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,0.4));}
.chevron-strip{
  height:14px;margin-top:14px;border-radius:2px;
  background:repeating-linear-gradient(135deg, var(--crimson) 0 14px, #0e0e0e 14px 28px);
  border:1px solid #0a0a0a;
}

/* ===== TABS ===== */
.tabs{display:flex;gap:0;margin:0 0 20px;border-bottom:1px solid var(--line);}
.tab{
  flex:1;text-align:center;padding:12px 4px;cursor:pointer;
  font-family:"Oswald",sans-serif;font-weight:500;
  font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;
}
.tab.active{color:var(--cream);border-bottom-color:var(--crimsonLt);}
.tab .ct{font-size:11px;margin-left:4px;color:var(--gold);font-weight:600;}

/* ===== ADD BAR ===== */
.addbar{display:flex;gap:8px;margin-bottom:22px;}
.addbar input{
  flex:1;background:var(--panel);border:1px solid var(--line);color:var(--ink);
  padding:13px 14px;border-radius:3px;font-family:inherit;font-size:15px;font-weight:500;
}
.addbar input::placeholder{color:var(--dim);}
.addbar input:focus{outline:none;border-color:var(--greenLt);background:var(--panel2);}
.addbar button{
  background:transparent;color:var(--cream);border:1px solid var(--greenLt);padding:0 20px;border-radius:3px;
  font-family:"Oswald",sans-serif;font-size:14px;font-weight:500;letter-spacing:1.5px;
  cursor:pointer;text-transform:uppercase;transition:background .15s;
}
.addbar button:hover{background:var(--green);}
.addbar button:active{background:var(--green);}

/* ===== CARDS as posters ===== */
.card{
  display:flex;gap:14px;background:var(--panel);border:1px solid var(--line);
  border-radius:4px;padding:12px;margin-bottom:10px;cursor:pointer;position:relative;
  overflow:hidden;transition:border-color .15s,background .15s;
}
.card:hover{border-color:#4a6b5c;background:var(--panel2);}
.card .strip{
  display:block;position:absolute;left:0;top:0;bottom:0;width:4px;
  background:var(--greenLt);
}
.card.s-progress .strip{background:var(--crimsonLt);}
.poster{
  width:56px;height:84px;flex:none;border-radius:3px;background:#0d1813;
  object-fit:cover;display:block;border:1px solid var(--line);margin-left:6px;
}
.poster.ph{display:flex;align-items:center;justify-content:center;color:var(--greenLt);font-size:22px;font-weight:600;
  font-family:"Oswald",sans-serif;}
.cbody{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;}
.ctitle{
  font-family:"Oswald",sans-serif;font-weight:500;
  font-size:20px;margin:0 0 5px;line-height:1.05;text-transform:uppercase;letter-spacing:0.5px;color:var(--cream);
}
.cmeta{font-size:11px;color:var(--dim);font-weight:500;text-transform:uppercase;letter-spacing:1.5px;
  font-family:"Oswald",sans-serif;}
.crow{display:flex;align-items:center;gap:10px;margin-top:8px;}
.imdb{
  font-family:"Oswald",sans-serif;font-weight:600;letter-spacing:1px;
  color:var(--gold);background:transparent;border:1px solid var(--gold);
  padding:1px 7px;border-radius:2px;font-size:12px;
}
.imdb::before{content:"\2605 ";font-size:10px;}
.kind{font-size:10px;color:var(--dim);background:transparent;border:1px solid var(--line);
  letter-spacing:1.5px;text-transform:uppercase;font-weight:500;padding:2px 7px;border-radius:2px;
  font-family:"Oswald",sans-serif;}
.datenote{font-size:11px;color:var(--greenLt);margin-top:6px;font-weight:500;
  text-transform:uppercase;letter-spacing:1.5px;font-family:"Oswald",sans-serif;}

.finbtn{
  flex:none;align-self:center;background:transparent;border:1px solid var(--line);
  color:var(--cream);border-radius:3px;padding:9px 12px;
  font-family:"Oswald",sans-serif;font-weight:500;letter-spacing:1px;
  font-size:11px;cursor:pointer;text-transform:uppercase;line-height:1.1;max-width:70px;
  transition:background .15s,border-color .15s;
}
.finbtn:hover{background:var(--green);border-color:var(--greenLt);}
.finbtn:active{background:var(--green);}

/* ===== WATCHED list ===== */
.donecard{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:13px 14px;margin-bottom:7px;cursor:pointer;position:relative;border-radius:3px;
  background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--crimson);
}
.donecard .dtitle{
  font-family:"Oswald",sans-serif;font-weight:500;
  font-size:17px;color:var(--dim);position:relative;display:inline-block;text-transform:uppercase;
  letter-spacing:0.5px;
}
.donecard .dtitle::after{
  content:"";position:absolute;left:-3px;right:-3px;top:52%;height:1.5px;
  background:var(--crimsonLt);transform:rotate(-1.5deg);transform-origin:center;
}
.donecard .ddate{
  font-family:"Oswald",sans-serif;font-size:12px;letter-spacing:1px;
  color:var(--gold);flex:none;font-weight:500;text-transform:uppercase;}

.empty{
  text-align:center;color:var(--dim);padding:40px 20px;font-weight:400;
  text-transform:uppercase;letter-spacing:2px;font-family:"Oswald",sans-serif;font-size:14px;
}

/* ===== MODAL: the Red Room ===== */
.overlay{
  position:fixed;inset:0;background:rgba(6,12,9,0.78);display:none;
  align-items:center;justify-content:center;z-index:50;padding:16px;backdrop-filter:blur(2px);
}
.overlay.on{display:flex;}
.modal{
  width:100%;max-width:560px;max-height:90vh;overflow-y:auto;background:var(--panel);
  border:1px solid var(--line);border-radius:4px;padding:0 0 24px;position:relative;
  box-shadow:0 24px 70px rgba(0,0,0,0.7);
}
.modal::before{
  content:"";display:block;height:12px;
  background:repeating-linear-gradient(135deg, var(--crimson) 0 12px, #0e0e0e 12px 24px);
}
.modal .top{display:flex;gap:15px;margin-bottom:14px;padding:20px 18px 0;}
.modal .poster{width:90px;height:135px;}
.modal h2{
  font-family:"Oswald",sans-serif;font-weight:600;color:var(--cream);
  font-size:28px;margin:0 0 8px;line-height:1.0;text-transform:uppercase;letter-spacing:0.5px;}
.modal .top .cmeta{margin-bottom:8px;}
.lbl{
  font-family:"Oswald",sans-serif;font-size:11px;color:var(--gold);
  letter-spacing:3px;text-transform:uppercase;display:block;margin:18px 0 9px;font-weight:500;}
.modal>.lbl,.modal>.statusbtns,.modal>.daterow,.modal>textarea,.modal>.actions,.modal>.cmeta{
  margin-left:18px;margin-right:18px;}
.modal>textarea{width:calc(100% - 36px);}
.statusbtns{display:flex;gap:8px;}
.sbtn{
  flex:1;padding:11px 4px;border-radius:3px;border:1px solid var(--line);background:transparent;
  color:var(--dim);font-family:"Oswald",sans-serif;font-weight:500;letter-spacing:1px;
  font-size:12px;cursor:pointer;text-transform:uppercase;transition:all .15s;}
.sbtn.sel.watch{background:var(--green);color:var(--cream);border-color:var(--greenLt);}
.sbtn.sel.progress{background:var(--crimson);color:var(--cream);border-color:var(--crimsonLt);}
.sbtn.sel.done{background:var(--crimson);color:var(--cream);border-color:var(--crimsonLt);}
.modal input[type=date],.modal textarea{
  background:#0d1813;border:1px solid var(--line);color:var(--ink);
  padding:11px;border-radius:3px;font-family:inherit;font-size:15px;font-weight:500;display:block;}
.modal input[type=date]:focus,.modal textarea:focus{outline:none;border-color:var(--greenLt);}
.modal textarea{min-height:72px;resize:vertical;}
.daterow{display:flex;flex-direction:column;gap:0;margin-left:18px;margin-right:18px;}
.daterow>div{flex:none;min-width:0;}
.daterow>div:last-child .lbl{margin-top:14px;}
.daterow input{width:100%;min-width:0;margin:0;box-sizing:border-box;}
.modal .actions{display:flex;justify-content:space-between;margin-top:26px;}
.modal .actions button{
  font-family:"Oswald",sans-serif;font-size:14px;font-weight:500;letter-spacing:1.5px;
  padding:11px 22px;border-radius:3px;cursor:pointer;border:1px solid var(--line);
  text-transform:uppercase;background:transparent;transition:background .15s,border-color .15s;}
.del{color:var(--crimsonLt);}
.del:hover{border-color:var(--crimsonLt);background:rgba(138,17,25,0.2);}
.close{color:var(--cream);border-color:var(--greenLt);}
.close:hover{background:var(--green);}

.sync{position:fixed;bottom:12px;right:14px;font-size:10px;color:var(--gold);
  font-family:"Oswald",sans-serif;font-weight:400;letter-spacing:2px;
  background:rgba(13,24,19,0.85);border:1px solid var(--line);padding:4px 9px;border-radius:3px;text-transform:uppercase;}
.muteBtn{
  position:absolute;top:10px;right:10px;z-index:3;
  background:rgba(13,24,19,0.5);border:1px solid var(--line);color:var(--cream);
  font-family:"Oswald",sans-serif;font-size:9px;font-weight:500;letter-spacing:1.5px;
  padding:4px 8px;border-radius:3px;cursor:pointer;text-transform:uppercase;opacity:0.8;}
.muteBtn.on{color:var(--gold);border-color:var(--gold);opacity:1;}

.coldBtn{
  display:block;width:100%;margin:18px 0 0;padding:16px 14px;cursor:pointer;
  background:transparent;border:1px solid var(--crimson);border-radius:4px;color:var(--cream);
  font-family:"Oswald",sans-serif;font-weight:500;font-size:14px;letter-spacing:3px;text-transform:uppercase;
  transition:background .2s,letter-spacing .2s;}
.coldBtn:hover{background:rgba(138,17,25,0.18);letter-spacing:4px;}
.coldBtn:active{background:rgba(138,17,25,0.3);}
.coldOut{
  margin:12px 0 30px;padding:20px 18px;border:1px solid var(--line);border-left:4px solid var(--crimson);
  border-radius:3px;background:var(--panel);color:var(--ink);
  font-family:"Oswald",sans-serif;font-weight:300;font-size:17px;line-height:1.5;letter-spacing:0.5px;
  text-transform:uppercase;animation:fadein .5s ease;}
.coldOut .hl{color:var(--crimsonLt);font-weight:500;}
.coldOut .since{display:block;margin-top:12px;font-size:12px;letter-spacing:2px;color:var(--gold);font-weight:400;}
@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.sync:empty{display:none;}
.hidden{display:none !important;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="masthead">
      <svg class="owl" viewBox="0 0 100 100" aria-hidden="true">
        <g fill="none" stroke="#f0ead6" stroke-width="4" stroke-linejoin="round" stroke-linecap="round">
          <path d="M33 26 L22 12 L37 22"/>
          <path d="M67 26 L78 12 L63 22"/>
          <path d="M50 18 C34 18 26 30 26 44 C26 64 38 84 50 88 C62 84 74 64 74 44 C74 30 66 18 50 18 Z"/>
          <circle cx="39" cy="42" r="8"/>
          <circle cx="61" cy="42" r="8"/>
          <path d="M50 52 L45 59 L50 63 L55 59 Z"/>
          <path d="M50 63 L50 86"/>
          <path d="M31 56 L41 60 M31 64 L41 68 M69 56 L59 60 M69 64 L59 68"/>
        </g>
        <circle cx="39" cy="42" r="3" fill="#f0ead6"/>
        <circle cx="61" cy="42" r="3" fill="#f0ead6"/>
      </svg>
      <div class="welcome">Welcome to</div>
      <h1>Binge Peaks</h1>
      <div class="locating">The owls are not what they seem</div>
      <div class="chevron-strip"></div>
      <button id="muteBtn" class="muteBtn" aria-label="Toggle sound">SOUND OFF</button>
    </div>
  </header>

  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="watch">TO WATCH<span class="ct" id="c-watch"></span></div>
    <div class="tab" data-tab="progress">WATCHING<span class="ct" id="c-progress"></span></div>
    <div class="tab" data-tab="done">WATCHED<span class="ct" id="c-done"></span></div>
  </div>

  <div class="addbar">
    <input id="addInput" type="text" placeholder="ADD A FILM OR SHOW..." autocomplete="off">
    <button id="addBtn">ADD</button>
  </div>

  <div id="list"></div>

  <button id="coldBtn" class="coldBtn">THE COLD INDIFFERENCE OF TIME</button>
  <div id="coldOut" class="coldOut hidden"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>

<div class="sync" id="sync"></div>

<script>
// ---- Config ----
var ROOT_PATH = "items";
var OMDB_KEY = "46e7b79c";
var FIREBASE_URL = "https://bingepeaks-default-rtdb.europe-west1.firebasedatabase.app";

var state = { items: {}, tab: "watch" };
var poll = null;

// ---- Firebase REST helpers (no SDK, keeps it single-file + ASCII-clean) ----
function fbGet(cb){
  fetch(FIREBASE_URL + "/" + ROOT_PATH + ".json")
    .then(function(r){ return r.json(); })
    .then(function(d){ cb(d || {}); })
    .catch(function(){ setSync("offline"); });
}
function fbPut(id, obj){
  setSync("saving");
  fetch(FIREBASE_URL + "/" + ROOT_PATH + "/" + id + ".json", {
    method:"PUT", body: JSON.stringify(obj)
  }).then(function(){ setSync("saved"); }).catch(function(){ setSync("offline"); });
}
function fbDelete(id){
  setSync("saving");
  fetch(FIREBASE_URL + "/" + ROOT_PATH + "/" + id + ".json", { method:"DELETE" })
    .then(function(){ setSync("saved"); }).catch(function(){ setSync("offline"); });
}
function setSync(t){
  var s = document.getElementById("sync");
  if(t==="saving"){ s.textContent = "saving..."; }
  else if(t==="offline"){ s.textContent = "offline"; }
  else { s.textContent = "synced"; setTimeout(function(){ s.textContent=""; }, 1500); }
}

// ---- OMDb lookup ----
function lookupOMDb(title, cb){
  if(OMDB_KEY === "OMDB_API_KEY_HERE"){ cb(null); return; }
  var url = "https://www.omdbapi.com/?apikey=" + OMDB_KEY + "&t=" + encodeURIComponent(title) + "&plot=short";
  fetch(url).then(function(r){ return r.json(); }).then(function(d){
    if(d && d.Response === "True"){ cb(d); } else { cb(null); }
  }).catch(function(){ cb(null); });
}

// ---- Add ----
function addItem(title){
  title = (title || "").trim();
  if(!title) return;
  var id = "x" + Date.now() + Math.floor(Math.random()*1000);
  var item = {
    title: title, status: "watch", kind: "",
    poster: "", imdb: "", year: "", genre: "", plot: "",
    started: "", finished: "", notes: "", added: Date.now()
  };
  state.items[id] = item;
  render();
  fbPut(id, item);
  lookupOMDb(title, function(d){
    if(d){
      item.title = d.Title || title;
      item.kind = (d.Type === "series") ? "series" : "film";
      item.poster = (d.Poster && d.Poster !== "N/A") ? d.Poster : "";
      item.imdb = (d.imdbRating && d.imdbRating !== "N/A") ? d.imdbRating : "";
      item.year = (d.Year && d.Year !== "N/A") ? d.Year : "";
      item.genre = (d.Genre && d.Genre !== "N/A") ? d.Genre : "";
      item.plot = (d.Plot && d.Plot !== "N/A") ? d.Plot : "";
      render();
      fbPut(id, item);
    }
  });
}

// ---- Render list ----
function counts(){
  var c = { watch:0, progress:0, done:0 };
  for(var id in state.items){ var s = state.items[id].status; if(c[s]!==undefined) c[s]++; }
  return c;
}
function render(){
  var c = counts();
  document.getElementById("c-watch").textContent = c.watch ? c.watch : "";
  document.getElementById("c-progress").textContent = c.progress ? c.progress : "";
  document.getElementById("c-done").textContent = c.done ? c.done : "";

  var list = document.getElementById("list");
  var ids = [];
  for(var id in state.items){ if(state.items[id].status === state.tab) ids.push(id); }
  ids.sort(function(a,b){
    var A = state.items[a], B = state.items[b];
    if(state.tab === "done"){ return (B.finished||"").localeCompare(A.finished||""); }
    if(state.tab === "progress"){ return (B.started||"").localeCompare(A.started||""); }
    return (B.added||0) - (A.added||0);
  });

  if(ids.length === 0){
    var msg = state.tab==="watch" ? "Nothing on the list yet. Add something above." :
              state.tab==="progress" ? "Nothing in progress." : "Nothing watched yet.";
    list.innerHTML = '<div class="empty">' + msg + '</div>';
    return;
  }

  var html = "";
  for(var i=0;i<ids.length;i++){
    var it = state.items[ids[i]];

    // Watched tab: collapsed, crossed-out, orange, title + date only
    if(state.tab === "done"){
      html += '<div class="donecard" data-id="' + ids[i] + '">' +
        '<span class="dtitle">' + esc(it.title) + '</span>' +
        '<span class="ddate">' + (it.finished ? fmtDate(it.finished) : "") + '</span>' +
      '</div>';
      continue;
    }

    var poster = it.poster
      ? '<img class="poster" src="' + it.poster + '" alt="">'
      : '<div class="poster ph">' + (it.kind==="series" ? "TV" : "&#9654;") + '</div>';
    var imdb = it.imdb ? '<span class="imdb">' + it.imdb + '</span>' : '';
    var kind = it.kind ? '<span class="kind">' + it.kind + '</span>' : '';
    var meta = [it.year, it.genre].filter(Boolean).join(" &middot; ");
    var datenote = "";
    if(it.status==="progress" && it.started){ datenote = '<div class="datenote">STARTED ' + fmtDate(it.started) + '</div>'; }
    html += '<div class="card s-' + it.status + '" data-id="' + ids[i] + '">' +
      '<div class="strip"></div>' + poster +
      '<div class="cbody">' +
        '<div class="ctitle">' + esc(it.title) + '</div>' +
        '<div class="cmeta">' + meta + '</div>' +
        datenote +
        '<div class="crow">' + imdb + kind + '</div>' +
      '</div>' +
      '<button class="finbtn" data-finish="' + ids[i] + '">DONE</button>' +
    '</div>';
  }
  list.innerHTML = html;
}

function fmtDate(d){
  if(!d) return "";
  var p = d.split("-");
  if(p.length!==3) return d;
  var months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  return p[2] + " " + months[parseInt(p[1],10)-1] + " " + p[0];
}
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function today(){ var d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function pad(n){ return n<10 ? "0"+n : ""+n; }

// ---- Detail modal ----
var currentId = null;
function openDetail(id){
  currentId = id;
  var it = state.items[id];
  var poster = it.poster
    ? '<img class="poster" src="' + it.poster + '" alt="">'
    : '<div class="poster ph">' + (it.kind==="series" ? "TV" : "&#9654;") + '</div>';
  var meta = [it.year, it.genre].filter(Boolean).join(" &middot; ");
  var imdb = it.imdb ? '<span class="imdb">' + it.imdb + '</span>' : '';
  var m = document.getElementById("modal");
  m.innerHTML =
    '<div class="top">' + poster +
      '<div><h2>' + esc(it.title) + '</h2>' +
      '<div class="cmeta">' + meta + '</div>' +
      '<div class="crow">' + imdb + '</div></div>' +
    '</div>' +
    (it.plot ? '<div class="cmeta" style="line-height:1.5">' + esc(it.plot) + '</div>' : '') +
    '<span class="lbl">Status</span>' +
    '<div class="statusbtns">' +
      '<button class="sbtn watch ' + (it.status==="watch"?"sel":"") + '" data-status="watch">TO WATCH</button>' +
      '<button class="sbtn progress ' + (it.status==="progress"?"sel":"") + '" data-status="progress">WATCHING</button>' +
      '<button class="sbtn done ' + (it.status==="done"?"sel":"") + '" data-status="done">WATCHED</button>' +
    '</div>' +
    '<div class="daterow">' +
      '<div><span class="lbl">Started</span><input type="date" id="dStarted" value="' + (it.started||"") + '"></div>' +
      '<div><span class="lbl">Finished</span><input type="date" id="dFinished" value="' + (it.finished||"") + '"></div>' +
    '</div>' +
    '<span class="lbl">Notes</span>' +
    '<textarea id="dNotes" placeholder="Thoughts, who recommended it, where to stream...">' + esc(it.notes||"") + '</textarea>' +
    '<div class="actions">' +
      '<button class="del" id="delBtn">Delete</button>' +
      '<button class="close" id="closeBtn">Done</button>' +
    '</div>';
  document.getElementById("overlay").classList.add("on");
}
function closeDetail(){
  if(currentId){
    var it = state.items[currentId];
    var n = document.getElementById("dNotes");
    var st = document.getElementById("dStarted");
    var fn = document.getElementById("dFinished");
    if(n) it.notes = n.value;
    if(st) it.started = st.value;
    if(fn) it.finished = fn.value;
    fbPut(currentId, it);
  }
  document.getElementById("overlay").classList.remove("on");
  currentId = null;
  render();
}

// ---- Event delegation (single document listener, per debugging playbook) ----
document.addEventListener("click", function(e){
  var t = e.target;

  // add
  if(t.id === "addBtn"){ var inp=document.getElementById("addInput"); if(inp.value.trim()){ BP_audio.add(); } addItem(inp.value); inp.value=""; return; }

  // mute toggle
  if(t.id === "muteBtn"){
    var nowMuted = !BP_audio.isMuted();
    BP_audio.setMuted(nowMuted);
    t.textContent = nowMuted ? "SOUND OFF" : "SOUND ON";
    t.classList.toggle("on", !nowMuted);
    if(!nowMuted){ BP_audio.note("F"); } // confirmation chime when unmuting
    return;
  }

  // the cold indifference of time
  if(t.id === "coldBtn"){
    var out = document.getElementById("coldOut");
    out.innerHTML = coldFact();
    out.classList.remove("hidden");
    return;
  }

  // tab switch
  var tab = t.closest ? t.closest(".tab") : null;
  if(tab){
    var tabs = document.querySelectorAll(".tab");
    for(var i=0;i<tabs.length;i++) tabs[i].classList.remove("active");
    tab.classList.add("active");
    var tb = tab.getAttribute("data-tab");
    BP_audio.note(tb==="watch" ? "F" : tb==="progress" ? "C" : "D");
    state.tab = tb;
    render();
    return;
  }

  // status buttons in modal
  if(t.classList && t.classList.contains("sbtn")){
    var ns = t.getAttribute("data-status");
    var it = state.items[currentId];
    it.status = ns;
    BP_audio.note(ns==="watch" ? "F" : ns==="progress" ? "C" : "D");
    if(ns==="progress" && !it.started) it.started = today();
    if(ns==="done" && !it.finished) it.finished = today();
    var btns = document.querySelectorAll(".sbtn");
    for(var j=0;j<btns.length;j++) btns[j].classList.remove("sel");
    t.classList.add("sel");
    // reflect date defaults if just set
    var st=document.getElementById("dStarted"), fn=document.getElementById("dFinished");
    if(st && !st.value) st.value = it.started || "";
    if(fn && !fn.value) fn.value = it.finished || "";
    fbPut(currentId, it);
    return;
  }

  if(t.id === "closeBtn"){ closeDetail(); return; }
  if(t.id === "delBtn"){
    if(confirm("Remove this from the list?")){ var id=currentId; fbDelete(id); delete state.items[id]; document.getElementById("overlay").classList.remove("on"); currentId=null; render(); }
    return;
  }
  if(t.id === "overlay"){ closeDetail(); return; }

  // quick finish button
  if(t.classList && t.classList.contains("finbtn")){
    var fid = t.getAttribute("data-finish");
    var fit = state.items[fid];
    fit.status = "done";
    BP_audio.finish();
    if(!fit.finished) fit.finished = today();
    fbPut(fid, fit);
    render();
    return;
  }

  // open card (full card or collapsed done card)
  var card = t.closest ? t.closest(".card,.donecard") : null;
  if(card){ BP_audio.open(); openDetail(card.getAttribute("data-id")); return; }
});

// ===== AUDIO: chorus-heavy single notes + Bb9 add chord =====
var BP_audio = (function(){
  var ctx = null;
  function ac(){ if(!ctx){ try{ ctx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return ctx; }
  // note frequencies (Hz)
  var Bb2=116.54, C3=130.81, D3=146.83, F3=174.61, Bb3=233.08,
      C4=261.63, D4=293.66, F4=349.23, Bb4=466.16, C5=523.25;
  // single notes for the status + tab buttons (lower octave)
  var NOTE = {
    F: F3,   // TO WATCH  -> F
    C: C3,   // WATCHING  -> the C below that F
    D: D3    // WATCHED   -> the D sitting between them
  };
  // Bb9 voicing for ADD: Bb, D, F, Bb, C
  var BB9 = [Bb2, D4, F4, Bb3, C5];
  // one note = a clean fundamental + soft octave shimmer, gentle lowpass, slight chorus
  function voice(freq, t0, dur, gainPeak){
    var a = ac(); if(!a) return;
    var filt = a.createBiquadFilter();
    filt.type="lowpass"; filt.frequency.value = freq*6; filt.Q.value=0.6;
    var g = a.createGain();
    filt.connect(g); g.connect(a.destination);
    // two lightly detuned voices for warmth (small detune so pitch stays clear)
    var dets=[-4,4];
    for(var k=0;k<dets.length;k++){
      var osc=a.createOscillator();
      osc.type="triangle"; osc.frequency.value=freq; osc.detune.value=dets[k];
      osc.connect(filt); osc.start(t0); osc.stop(t0+dur+0.05);
    }
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.linearRampToValueAtTime(gainPeak, t0 + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  }
  function resume(){ var a=ac(); if(a && a.state==="suspended") a.resume(); }
  var muted = true; // muted by default
  function tone(freq, dur, peak){
    if(muted) return;
    var a = ac(); if(!a) return; resume();
    voice(freq, a.currentTime + 0.01, dur||1.1, peak||0.16);
  }
  function chord(notes, dur, peak, stagger){
    if(muted) return;
    var a = ac(); if(!a) return; resume();
    var t0 = a.currentTime + 0.01;
    for(var i=0;i<notes.length;i++){
      voice(notes[i], t0 + i*(stagger||0), dur||1.3, peak||0.1);
    }
  }
  return {
    add:    function(){ chord(BB9, 1.5, 0.1, 0.05); },          // Bb9 bloom
    note:   function(n){ tone(NOTE[n] || NOTE.F, 1.2, 0.18); }, // single status note
    finish: function(){ tone(NOTE.D, 1.2, 0.18); },             // WATCHED = D
    open:   function(){ tone(C5, 0.6, 0.08); },                 // soft high tick on open
    tab:    function(){ tone(Bb2, 0.4, 0.07); },                // low tick on tab switch
    setMuted: function(m){ muted = m; if(!m){ resume(); } },
    isMuted:  function(){ return muted; }
  };
})();

function daysBetween(a, b){ return Math.round((b - a) / 86400000); }
function humanSpan(days){
  var y = days / 365.25;
  if(y >= 1.5) return (Math.round(y*10)/10) + " YEARS";
  var m = days / 30.44;
  if(m >= 1.5) return Math.round(m) + " MONTHS";
  return days + " DAYS";
}
function coldFact(){
  var now = new Date();
  var exceeded = [];
  for(var i=0;i<COLD_FACTS.length;i++){
    var f = COLD_FACTS[i];
    var refGap = daysBetween(new Date(f.refEarly), new Date(f.refLate));
    var sinceNow = daysBetween(new Date(f.release), now);
    if(sinceNow > refGap){ exceeded.push({ f:f, over:sinceNow-refGap }); }
  }
  var pick;
  if(exceeded.length){
    pick = exceeded[Math.floor(Math.random()*exceeded.length)];
  } else {
    var f2 = COLD_FACTS[Math.floor(Math.random()*COLD_FACTS.length)];
    var refGap2 = daysBetween(new Date(f2.refEarly), new Date(f2.refLate));
    pick = { f:f2, over:daysBetween(new Date(f2.release), now) - refGap2 };
  }
  var f = pick.f;
  if(pick.over >= 0){
    return '<span>IT HAS NOW BEEN LONGER SINCE <span class="hl">' + f.film +
      '</span> AND NOW THAN IT WAS BETWEEN <span class="hl">' + f.refLabel + '</span>.</span>' +
      '<span class="since">BY ' + humanSpan(pick.over) + ', AND COUNTING.</span>';
  }
  return '<span>IN ' + humanSpan(-pick.over) + ' IT WILL HAVE BEEN LONGER SINCE <span class="hl">' +
    f.film + '</span> AND NOW THAN IT WAS BETWEEN <span class="hl">' + f.refLabel + '</span>.</span>' +
    '<span class="since">SAVOUR THE TIME YOU HAVE LEFT.</span>';
}
